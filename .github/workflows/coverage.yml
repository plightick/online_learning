name: Coverage

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests and build JaCoCo report
        run: ./mvnw -B verify

      - name: Publish coverage summary
        if: always()
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report_path = Path("target/site/jacoco/jacoco.xml")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("## JaCoCo Coverage\n\n")

              if not report_path.exists():
                  summary.write("JaCoCo report was not generated.\n")
                  raise SystemExit(0)

              counters = {
                  counter.attrib["type"]: counter.attrib
                  for counter in ET.parse(report_path).getroot().findall("counter")
              }

              summary.write("| Metric | Coverage | Covered | Total |\n")
              summary.write("| --- | ---: | ---: | ---: |\n")

              for metric in ("LINE", "BRANCH", "METHOD", "CLASS"):
                  counter = counters.get(metric)
                  if counter is None:
                      continue

                  covered = int(counter["covered"])
                  missed = int(counter["missed"])
                  total = covered + missed
                  percent = f"{covered / total * 100:.2f}%" if total else "n/a"

                  summary.write(
                      f"| {metric.title()} | {percent} | {covered} | {total} |\n"
                  )

              summary.write("\nHTML report is uploaded as the `jacoco-report` artifact.\n")
          PY

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: warn
